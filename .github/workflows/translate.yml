name: Generate missing translations

on:
  push:
    branches: ["main"]
    paths:
      - "content/posts/**/*.md"
      - "scripts/translate.js"
      - "scripts/lib/content.js"
      - ".github/workflows/translate.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: translations
  cancel-in-progress: false

jobs:
  translate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate translations
        run: npm run translate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-5-mini' }}

      - name: Commit generated translations
        run: |
          if git diff --quiet; then
            echo "No translations generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts
          git commit -m "chore: add generated translations"
          git push
